<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Drop maximum-scale=1: blocks pinch-zoom for low-vision users (PSI a11y warning). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: indexing + default page metadata. Per-page <title> / description are
         updated client-side by client/src/components/Seo.tsx after React mounts. -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <title>TwinSeam Deals — Sporting Goods Deals Up to 50% Off MSRP</title>
    <meta name="description" content="TwinSeam Deals aggregates the best discounts on baseball, softball, soccer, basketball, football, hockey, lacrosse and more — curated daily from top retailers and marketplaces." />
    <link rel="canonical" href="https://www.tssdeals.com/" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TwinSeam Deals" />
    <meta property="og:title" content="TwinSeam Deals — Sporting Goods Deals Up to 50% Off MSRP" />
    <meta property="og:description" content="Curated daily discounts on baseball, softball, soccer, basketball, football, hockey, lacrosse and more." />
    <meta property="og:url" content="https://www.tssdeals.com/" />
    <meta property="og:image" content="https://www.tssdeals.com/icons/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TwinSeam Deals — Sporting Goods Deals Up to 50% Off MSRP" />
    <meta name="twitter:description" content="Curated daily discounts on baseball, softball, soccer, basketball, football, hockey, lacrosse and more." />
    <meta name="twitter:image" content="https://www.tssdeals.com/icons/icon-512.png" />

    <meta name="fo-verify" content="9bbaf780-c36d-45c9-bbcd-ffc602189718" />
    <meta name="impact-site-verification" value="82cfb0e0-2f62-4fa7-87b7-99d29f73aa38" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-48.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TSS Deals" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Performance: only the two families the CSS actually uses
         (IBM Plex Sans for --font-sans, Fraunces for --font-serif headings).
         The previous bundle pulled 25 families with full weight axes — that
         was the dominant LCP/FCP contributor on mobile per PageSpeed. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400..800&display=swap"
      rel="stylesheet"
    />

    <!-- Speculative connections to ad / affiliate origins we're going to hit
         anyway, so the TCP+TLS handshake doesn't land on the critical path. -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.anrdoezrs.net" />

    <!-- AdSense: async so it never blocks parsing. -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1760488002848843" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <!-- CJ impression beacon — async so it can't block the body. -->
    <script async src="https://www.anrdoezrs.net/am/101681221/include/allCj/impressions/page/am.js"></script>
  </body>
</html>
